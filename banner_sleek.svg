<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg-sleek" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#070a13"/>
    </linearGradient>
    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="wave-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-sleek)" rx="16" />

  <!-- Animated Glowing Orbs/Waves (Blurred heavily for depth) -->
  <circle cx="150" cy="180" r="120" fill="url(#wave-grad-1)" filter="url(#blur-bg)" />
  <circle cx="680" cy="40" r="140" fill="url(#wave-grad-2)" filter="url(#blur-bg)" />
  <circle cx="400" cy="100" r="80" fill="#3b82f6" fill-opacity="0.15" filter="url(#blur-bg)" />

  <!-- Decorative border border line (Subtle top line) -->
  <line x1="20" y1="0" x2="780" y2="0" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" />
  <rect x="1" y="1" width="798" height="198" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />

  <!-- Content Group -->
  <g transform="translate(60, 0)">
    <!-- Tech Stack Icons (Mini abstract representations) -->
    <path d="M 640 70 L 660 85 L 640 100 L 620 85 Z" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.6" />
    <path d="M 650 110 A 12 12 0 1 1 650 134 A 12 12 0 1 1 650 110" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5" />
    <line x1="630" y1="125" x2="670" y2="125" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />

    <!-- Developer Name -->
    <text x="0" y="85" fill="url(#text-grad)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-weight="800" font-size="42" letter-spacing="-0.5">Ertan</text>
    
    <!-- Username tag -->
    <rect x="125" y="55" width="85" height="24" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="167" y="71" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">@ertandev</text>

    <!-- Professional Subtitle -->
    <text x="0" y="120" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-weight="400" font-size="16" letter-spacing="0.5">
      Full-Stack Developer <tspan fill="#6366f1">✦</tspan> Software Developer <tspan fill="#06b6d4">✦</tspan> Creator
    </text>

    <!-- Tech Stack Mini-Badges / Dots -->
    <g transform="translate(0, 145)">
      <!-- JS -->
      <circle cx="10" cy="5" r="4" fill="#facc15" />
      <text x="20" y="9" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500">JavaScript</text>

      <!-- Python -->
      <circle cx="105" cy="5" r="4" fill="#38bdf8" />
      <text x="115" y="9" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500">Python</text>

      <!-- React -->
      <circle cx="180" cy="5" r="4" fill="#60a5fa" />
      <text x="190" y="9" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500">React</text>

      <!-- Node -->
      <circle cx="250" cy="5" r="4" fill="#4ade80" />
      <text x="260" y="9" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500">Node.js</text>
    </g>
  </g>
</svg>
